name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.0
  NODE_VERSION: 24
  PNPM_VERSION: 9.0.6
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Convex production environment
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          convex_env_file="$(mktemp)"
          trap 'rm -f "$convex_env_file"' EXIT

          {
            printf 'SITE_URL=%s\n' "$SITE_URL"
            printf 'GITHUB_CLIENT_ID=%s\n' "$GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$GITHUB_CLIENT_SECRET"
          } > "$convex_env_file"

          pnpm --filter @workspace/backend exec convex env set --prod --from-file "$convex_env_file"

      - name: Deploy Convex production
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm --filter @workspace/backend exec convex deploy --prod

      - name: Build web app
        env:
          VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
        run: pnpm --filter web build

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          SITE_URL: ${{ vars.SITE_URL }}
          VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
        run: |
          worker_secrets_file="$(mktemp)"
          trap 'rm -f "$worker_secrets_file"' EXIT

          {
            printf 'SITE_URL=%s\n' "$SITE_URL"
            printf 'GITHUB_CLIENT_ID=%s\n' "$GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$GITHUB_CLIENT_SECRET"
            printf 'VITE_CONVEX_URL=%s\n' "$VITE_CONVEX_URL"
            printf 'VITE_CONVEX_SITE_URL=%s\n' "$VITE_CONVEX_SITE_URL"
          } > "$worker_secrets_file"

          pnpm --filter web exec wrangler deploy --config wrangler.jsonc --secrets-file "$worker_secrets_file"
